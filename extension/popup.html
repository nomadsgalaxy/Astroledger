<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; width: 280px; padding: 14px; background: #1a1a1a; color: #e0e0e0; margin: 0; }
    h1 { margin: 0 0 4px; font-size: 16px; color: #FD5000; }
    .sub { font-size: 11px; color: #888; margin-bottom: 14px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: #888; margin-bottom: 4px; }
    input { width: 100%; padding: 6px 8px; box-sizing: border-box; background: #262626; color: #fff; border: 1px solid #333; border-radius: 4px; font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; }
    button { width: 100%; margin-top: 10px; padding: 8px 12px; background: #FD5000; color: #fff; border: 0; border-radius: 4px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; }
    .msg { margin-top: 10px; font-size: 11px; color: #888; }
    .ok { color: #65C900; }
    .err { color: #ED0000; }
    .ports { font-size: 10px; color: #666; margin-top: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>✦ ASTROLEDGER</h1>
  <div class="sub">Order capture extension</div>
  <label>Astroledger endpoint</label>
  <input id="endpoint" placeholder="http://localhost:5050/api/orders/ingest" />
  <button id="save">Save</button>
  <div class="msg" id="msg"></div>
  <div class="ports">When you visit an order-details page on Amazon, DoorDash, Uber Eats, Instacart, or Etsy, the extension extracts and uploads the order to your Astroledger instance. You must already be signed into Astroledger (same browser).</div>
  <script src="popup.js"></script>
</body>
</html>
